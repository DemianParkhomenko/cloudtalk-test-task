<div class="auth-page">
  <div class="auth-card">
    <div class="auth-card__logo">
      <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
        <rect width="40" height="40" rx="8" fill="#5b3a29" />
        <path
          d="M12 20l5 5 11-11"
          stroke="white"
          stroke-width="3"
          stroke-linecap="round"
          stroke-linejoin="round"
        />
      </svg>
    </div>
    <h1 class="auth-card__title">Join Todo list</h1>
    <p class="auth-card__subtitle">Create your space for clear daily planning</p>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form" novalidate>
      <app-input
        label="Email"
        type="email"
        placeholder="Enter your email"
        autocomplete="email"
        formControlName="email"
        [error]="emailError"
      />

      <app-input
        label="Password"
        type="password"
        placeholder="Create a password (min. 8 characters)"
        autocomplete="new-password"
        formControlName="password"
        [error]="passwordError"
      />

      @if (error()) {
      <p class="auth-form__error" role="alert">{{ error() }}</p>
      }

      <app-button type="submit" variant="primary" [fullWidth]="true" [loading]="loading()">
        Create account
      </app-button>
    </form>

    <p class="auth-card__footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>
  </div>
</div>
